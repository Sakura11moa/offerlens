services:
  backend:
    build:
      context: ./backend
    container_name: offerlens-backend
    environment:
      - APP_NAME=${APP_NAME:-OfferLens Backend}
      - APP_ENV=${APP_ENV:-dev}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - LLM_CONNECT_TIMEOUT=${LLM_CONNECT_TIMEOUT:-5}
      - LLM_READ_TIMEOUT=${LLM_READ_TIMEOUT:-45}
      - LLM_WRITE_TIMEOUT=${LLM_WRITE_TIMEOUT:-20}
      - LLM_POOL_TIMEOUT=${LLM_POOL_TIMEOUT:-10}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-1}
      - LLM_RETRY_BACKOFF=${LLM_RETRY_BACKOFF:-1.0}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: offerlens-frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "5173:5173"
