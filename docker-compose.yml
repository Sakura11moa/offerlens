services:
  backend:
    build:
      context: ./backend
    container_name: offerlens-backend
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: offerlens-frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "5173:5173"
